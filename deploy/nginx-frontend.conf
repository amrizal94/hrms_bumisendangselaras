# ─────────────────────────────────────────────────────────────────
# Nginx Config — FaceHRM Web (Next.js)
# Paste ke: aaPanel → Website → [domain] → Config
# Ganti "yourdomain.com" dengan domain Anda
# ─────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL (aaPanel auto-isi jika pakai Let's Encrypt)
    # ssl_certificate     /www/server/panel/vhost/cert/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /www/server/panel/vhost/cert/yourdomain.com/privkey.pem;

    # Redirect HTTP ke HTTPS
    if ($scheme != "https") {
        return 301 https://$host$request_uri;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Static files dari Next.js (cache agresif)
    location /_next/static/ {
        alias /www/wwwroot/facehrm-web/.next/static/;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Public assets (images, models face-api, dll)
    location /public/ {
        alias /www/wwwroot/facehrm-web/public/;
        expires 30d;
        access_log off;
    }

    # favicon, robots.txt, dll dari public root
    location ~* ^/(favicon\.ico|robots\.txt|sitemap\.xml)$ {
        root /www/wwwroot/facehrm-web/public;
        expires 30d;
        access_log off;
    }

    # Semua request lainnya → Next.js Node.js server
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
