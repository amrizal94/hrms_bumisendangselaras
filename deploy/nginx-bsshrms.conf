# ─────────────────────────────────────────────────────────────────
# Nginx Config — BSS HRMS (SATU DOMAIN, backend + frontend)
# Domain: hrms.bumisendangselaras.co.id
#
# CARA PAKAI di aaPanel:
#   1. Website → Add Site → domain: hrms.bumisendangselaras.co.id, PHP 8.3
#   2. SSL → Let's Encrypt → Apply (biarkan aaPanel isi cert path)
#   3. Config → hapus semua → paste isi file ini
#      (sesuaikan ssl_certificate path jika berbeda)
# ─────────────────────────────────────────────────────────────────

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name hrms.bumisendangselaras.co.id;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name hrms.bumisendangselaras.co.id;

    # SSL — aaPanel Let's Encrypt (path biasanya seperti di bawah)
    ssl_certificate     /www/server/panel/vhost/cert/hrms.bumisendangselaras.co.id/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/hrms.bumisendangselaras.co.id/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Upload limit (untuk face recognition descriptor)
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;

    # ─── Laravel: uploaded files via storage:link ─────────────────
    location /storage/ {
        alias /www/wwwroot/bsshrms/backend/public/storage/;
        expires 30d;
        access_log off;
    }

    # ─── Next.js: built static assets (cache agresif) ─────────────
    location /_next/static/ {
        alias /www/wwwroot/bsshrms/web/.next/static/;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── Laravel: API & Sanctum CSRF ──────────────────────────────
    # Semua request /api/* dan /sanctum/* → PHP-FPM Laravel
    location ~ ^/(api|sanctum) {
        root /www/wwwroot/bsshrms/backend/public;
        try_files $uri $uri/ /index.php?$query_string;

        location ~ \.php$ {
            # Sesuaikan sock path dengan versi PHP di aaPanel Anda
            # Cek di: aaPanel → PHP 8.3 → PHP-FPM → socket path
            fastcgi_pass   unix:/tmp/php-cgi-83.sock;
            fastcgi_index  index.php;
            fastcgi_param  SCRIPT_FILENAME /www/wwwroot/bsshrms/backend/public/index.php;
            fastcgi_param  PATH_INFO       $fastcgi_path_info;
            fastcgi_read_timeout 120;
            include        fastcgi_params;
        }
    }

    # ─── Semua request lain → Next.js ─────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade     $http_upgrade;
        proxy_set_header   Connection  'upgrade';
        proxy_set_header   Host        $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ─── Security headers ─────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
}
