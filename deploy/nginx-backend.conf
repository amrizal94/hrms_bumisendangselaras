# ─────────────────────────────────────────────────────────────────
# Nginx Config — FaceHRM API (Laravel)
# Paste ke: aaPanel → Website → [subdomain api] → Config
# Ganti "api.yourdomain.com" dan path sesuai server Anda
# ─────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen 443 ssl http2;
    server_name api.yourdomain.com;

    root /www/wwwroot/facehrm-api/public;
    index index.php;

    # SSL
    # ssl_certificate     /www/server/panel/vhost/cert/api.yourdomain.com/fullchain.pem;
    # ssl_certificate_key /www/server/panel/vhost/cert/api.yourdomain.com/privkey.pem;

    if ($scheme != "https") {
        return 301 https://$host$request_uri;
    }

    # Upload limit (untuk face enrollment descriptor)
    client_max_body_size 20M;

    # CORS — hanya dari Laravel (config/cors.php), JANGAN tambah di sini
    # (duplicate header akan block request dari browser)

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass   unix:/tmp/php-cgi-83.sock;   # sesuaikan versi PHP di aaPanel
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_read_timeout 120;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Static assets Laravel
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2?)$ {
        expires 30d;
        access_log off;
    }
}
