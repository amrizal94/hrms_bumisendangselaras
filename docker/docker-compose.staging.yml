version: '3.8'

# ─────────────────────────────────────────────────────────────────
# FaceHRM — Staging Environment
#
# Cara pakai:
#   1. cp docker/.env.staging.example docker/.env.staging
#   2. Edit docker/.env.staging sesuai kebutuhan
#   3. docker compose -f docker/docker-compose.staging.yml --env-file docker/.env.staging up -d
#   4. docker exec facehrm_staging_app php artisan migrate --force
#   5. docker exec facehrm_staging_app php artisan db:seed --force
#
# Berbeda dari dev:
#   - Port 8080 (tidak konflik dengan dev di port 80)
#   - APP_ENV=staging, APP_DEBUG=false
#   - Volume terpisah (staging_postgres_data, staging_redis_data)
#   - Health checks untuk postgres & redis sebelum app start
# ─────────────────────────────────────────────────────────────────

services:
  app:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: facehrm_staging_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ../backend:/var/www/html
      - ./php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - facehrm_staging_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: staging
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost:8080}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-facehrm_staging}
      DB_USERNAME: ${DB_USERNAME:-facehrm_user}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: sync
      LOG_CHANNEL: stderr
      LOG_LEVEL: warning
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost:8080}

  nginx:
    image: nginx:1.25-alpine
    container_name: facehrm_staging_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ../backend:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - facehrm_staging_network
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/up"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: facehrm_staging_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-facehrm_staging}
      POSTGRES_USER: ${DB_USERNAME:-facehrm_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - staging_postgres_data:/var/lib/postgresql/data
    networks:
      - facehrm_staging_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-facehrm_user} -d ${DB_DATABASE:-facehrm_staging}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: facehrm_staging_redis
    restart: unless-stopped
    volumes:
      - staging_redis_data:/data
    networks:
      - facehrm_staging_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

networks:
  facehrm_staging_network:
    driver: bridge

volumes:
  staging_postgres_data:
  staging_redis_data:
