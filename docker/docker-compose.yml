version: '3.8'

services:
  app:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: facehrm_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ../backend:/var/www/html
      - ./php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - facehrm_network
    depends_on:
      - postgres
      - redis
    environment:
      - APP_ENV=local
      - APP_DEBUG=true

  nginx:
    image: nginx:1.25-alpine
    container_name: facehrm_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../backend:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - facehrm_network
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    container_name: facehrm_postgres
    restart: unless-stopped
    ports:
      - "5436:5432"
    environment:
      POSTGRES_DB: facehrm
      POSTGRES_USER: facehrm_user
      POSTGRES_PASSWORD: facehrm_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - facehrm_network

  redis:
    image: redis:7-alpine
    container_name: facehrm_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - facehrm_network

networks:
  facehrm_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
