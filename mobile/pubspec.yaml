name: bsshrms
description: BSS HRMS - Bumi Sendang Selaras Human Resource Management System
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management (no code generation)
  flutter_riverpod: ^3.2.1

  # HTTP client
  dio: ^5.7.0

  # Secure storage for tokens
  flutter_secure_storage: ^10.0.0

  # Navigation
  go_router: ^17.1.0

  # UI
  cupertino_icons: ^1.0.8

  # App version info (reads from build flags / pubspec)
  package_info_plus: ^8.1.3

  # GPS location + geofencing
  geolocator: ^13.0.2

  # Offline support
  connectivity_plus: ^6.0.5
  shared_preferences: ^2.3.0

  # Camera + face recognition
  camera: ^0.11.0
  google_mlkit_face_detection: ^0.12.0
  image: ^4.3.0
  permission_handler: ^11.3.1

  # PDF generation + print/share
  pdf: ^3.11.1
  printing: ^5.13.1

  # File picker (for expense receipt upload)
  file_picker: ^8.1.2

  # QR code scanning (staff scan) + display (admin/HR generate)
  mobile_scanner: ^7.0.0
  qr_flutter: ^4.1.0

  # URL launcher (meeting video links)
  url_launcher: ^6.3.1

  # Push notifications (FCM)
  firebase_core: ^3.13.1
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
